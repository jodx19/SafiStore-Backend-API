version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: safistore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=safistore;Username=postgres;Password=postgres
      - Jwt__Secret=${Jwt__Secret}
      - STRIPE_KEY=${STRIPE_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - safinet

volumes:
  pgdata:

networks:
  safinet:
    driver: bridge
